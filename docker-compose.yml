services:
  db:
    image: postgres:16
    container_name: ai_job_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_job_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_job_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ai_job_tracker_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: AI Job Tracker
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_job_tracker
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_job_tracker_test
      SECRET_KEY: docker_local_secret_key_change_later
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  uploads_data: